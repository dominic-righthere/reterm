<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reterm player</title>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: #14141f;
      color: #e6e6e6;
    }
    #player { width: min(900px, 100%); }
    .hint { font-size: 13px; color: #8a8aa0; }
    .hint a { color: #b69bf5; }
    .error { color: #ff8080; font-size: 14px; max-width: 600px; text-align: center; }
  </style>
</head>
<body>
  <div id="player"></div>
  <div class="hint" id="hint"></div>

  <link rel="stylesheet" href="../dist/style.css">
  <script type="module">
    import { createElement } from 'react';
    import { createRoot } from 'react-dom/client';
    import { TerminalPlayer } from '../dist/index.js';

    const params = new URLSearchParams(location.search);
    // ?src=<url> loads any recording URL; ?r=<name> loads recordings/<name>.json
    const name = params.get('r');
    const src = params.get('src') || (name ? `../recordings/${encodeURIComponent(name)}.json` : '../recordings/demo.json');

    const root = createRoot(document.getElementById('player'));
    const hint = document.getElementById('hint');

    root.render(
      createElement(TerminalPlayer, {
        src,
        autoPlay: true,
        loop: true,
        showControls: true,
        fit: true,
        onError: (err) => {
          // Build with textContent (never innerHTML): `src` and the error come
          // from the query string / network and must not be parsed as HTML.
          const div = document.createElement('div');
          div.className = 'error';
          div.textContent = `Couldn't load recording from ${src} — ${err?.message ?? err}`;
          document.getElementById('player').replaceChildren(div);
        },
      })
    );

    hint.innerHTML = 'Made with <a href="https://github.com/dominic-righthere/reterm">reterm</a> — record terminal sessions as GIF + structured JSON.';
  </script>
</body>
</html>
