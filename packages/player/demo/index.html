<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reterm Player Demo</title>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
    }
  }
  </script>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 40px;
      min-height: 100vh;
    }
    h1 {
      margin-bottom: 24px;
    }
    .demo-section {
      margin: 32px 0;
    }
    h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>@reterm/player Demo</h1>

  <div class="demo-section">
    <h2>Default (Dracula theme)</h2>
    <div id="player1"></div>
  </div>

  <div class="demo-section">
    <h2>Nord theme, auto-play, looping</h2>
    <div id="player2"></div>
  </div>

  <div class="demo-section">
    <h2>No controls, auto-play</h2>
    <div id="player3"></div>
  </div>

  <div class="demo-section">
    <h2>Fit mode - 400px container</h2>
    <div id="player4" style="width: 400px; border: 2px dashed #444; padding: 10px;"></div>
  </div>

  <div class="demo-section">
    <h2>Fit mode - 600px container</h2>
    <div id="player5" style="width: 600px; border: 2px dashed #444; padding: 10px;"></div>
  </div>

  <link rel="stylesheet" href="../dist/style.css">
  <script type="module">
    import { createElement } from 'react';
    import { createRoot } from 'react-dom/client';
    import { TerminalPlayer } from '../dist/index.js';

    // Fetch the recording
    const response = await fetch('./recording.json');
    const recording = await response.json();

    // Demo 1: Default
    createRoot(document.getElementById('player1')).render(
      createElement(TerminalPlayer, {
        data: recording,
        showControls: true,
      })
    );

    // Demo 2: Nord theme, auto-play, loop
    createRoot(document.getElementById('player2')).render(
      createElement(TerminalPlayer, {
        data: recording,
        theme: 'nord',
        autoPlay: true,
        loop: true,
        speed: 1.5,
      })
    );

    // Demo 3: No controls
    createRoot(document.getElementById('player3')).render(
      createElement(TerminalPlayer, {
        data: recording,
        theme: 'github-dark',
        autoPlay: true,
        showControls: false,
        loop: true,
      })
    );

    // Demo 4: Fit mode - narrow
    createRoot(document.getElementById('player4')).render(
      createElement(TerminalPlayer, {
        data: recording,
        fit: true,
        autoPlay: true,
        loop: true,
      })
    );

    // Demo 5: Fit mode - medium
    createRoot(document.getElementById('player5')).render(
      createElement(TerminalPlayer, {
        data: recording,
        fit: true,
        theme: 'nord',
      })
    );
  </script>
</body>
</html>
