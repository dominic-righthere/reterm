name: Release

# Publishes reterm to PyPI via Trusted Publishing (OIDC) — no API token stored.
#
# One-time setup (you):
#   1. Create a PyPI account + enable 2FA.
#   2. On PyPI add a "pending publisher" for project `reterm`:
#        Owner:        dominic-righthere
#        Repository:   reterm
#        Workflow:     release.yml
#        Environment:  pypi
#      (PyPI → Your projects → Publishing, or Account → Publishing for a new project.)
#
# To release: bump the version in pyproject.toml, then create a GitHub Release
# (tag e.g. v0.1.0). This workflow builds and publishes automatically. You can
# also trigger it manually via "Run workflow".

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/reterm
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv build
      - run: uv publish --trusted-publishing always
